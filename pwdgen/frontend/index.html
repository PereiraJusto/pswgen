<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Premium | Seguro & Local</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>Gerador de Senhas</h1>
            <p>Segurança criptográfica direto no seu navegador.</p>
        </header>

        <main>
            <div class="result-container">
                <input type="text" id="password-display" readonly placeholder="Senha gerada aqui...">
                <button id="copy-btn" title="Copiar Senha">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
            </div>

            <div class="strength-bar-container">
                <div id="strength-bar" class="strength-bar"></div>
            </div>

            <div class="settings">
                <div class="setting-item">
                    <div class="setting-label">
                        <span>Comprimento</span>
                        <span id="length-value">16</span>
                    </div>
                    <input type="range" id="length-slider" min="4" max="64" value="16">
                </div>

                <div class="options-grid">
                    <label class="checkbox-container">
                        <input type="checkbox" id="uppercase" checked>
                        <span class="checkmark"></span>
                        Maiúsculas
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="lowercase" checked>
                        <span class="checkmark"></span>
                        Minúsculas
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="numbers" checked>
                        <span class="checkmark"></span>
                        Números
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="symbols" checked>
                        <span class="checkmark"></span>
                        Símbolos
                    </label>
                </div>
            </div>

            <button id="generate-btn" class="primary-btn">Gerar Nova Senha</button>
        </main>

        <footer>
            <p>100% Client-side. Nenhuma informação sai do seu PC.</p>
        </footer>
    </div>

    <div id="toast" class="toast">Copiado com sucesso!</div>

    <script src="script.js"></script>
</body>
</html>
